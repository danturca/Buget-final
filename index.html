<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SmartBuget Mobil</title>
    <!-- Tailwind pentru design iOS curat și Chart.js pentru grafice -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-12">

    <!-- Header Stil iOS -->
    <div class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 pt-6 pb-3 z-50 flex justify-between items-center">
        <div>
            <span id="dataCurenta" class="text-xs font-bold text-gray-400 uppercase tracking-wider">Mai 2026</span>
            <h1 class="text-2xl font-extrabold text-indigo-600">SmartBuget</h1>
        </div>
        <div class="bg-indigo-50 p-2 rounded-xl text-right">
            <span class="text-[10px] uppercase font-bold text-indigo-400 block">Buget Lunar</span>
            <input type="number" id="bugetSetat" value="4000" onchange="schimbaBuget(this.value)" class="bg-transparent font-bold text-indigo-700 w-16 text-right outline-none"> <span class="text-xs font-bold text-indigo-700">LEI</span>
        </div>
    </div>

    <div class="p-4 space-y-5 max-w-md mx-auto">

        <!-- Inele de Progres & Sumar rapid -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
            <div class="space-y-1">
                <span class="text-xs font-medium text-gray-400 block">Consumat total (Anual)</span>
                <h2 id="textTotal" class="text-2xl font-black text-gray-800">0.00 LEI</h2>
                <span id="textRamas" class="text-xs font-semibold text-emerald-600 block">Rămas luna asta: 0 LEI</span>
            </div>
            <div class="relative w-20 h-20 flex items-center justify-center">
                <!-- Procent vizual din bugetul lunar -->
                <canvas id="graficProgresAnual" class="absolute inset-0"></canvas>
                <span id="procentCentru" class="text-sm font-bold text-indigo-600">0%</span>
            </div>
        </div>

        <!-- Secțiune Scanare & Adăugare Rapidă -->
        <div class="grid grid-cols-2 gap-3">
            <!-- Butonul Foto / Cameră -->
            <label class="bg-indigo-600 text-white p-4 rounded-2xl shadow-sm flex flex-col items-center justify-center text-center active:scale-95 transition cursor-pointer">
                <span class="text-2xl mb-1">📷</span>
                <span class="text-xs font-bold">Scanează Bon</span>
                <span class="text-[9px] opacity-75 mt-0.5">Deschide camera foto</span>
                <input type="file" accept="image/*" class="hidden" onchange="proceseazaBonFoto(event)">
            </label>

            <!-- Buton Deschidere Formular Manual -->
            <button onclick="comutaFormular()" class="bg-slate-900 text-white p-4 rounded-2xl shadow-sm flex flex-col items-center justify-center text-center active:scale-95 transition">
                <span class="text-2xl mb-1">✍️</span>
                <span class="text-xs font-bold">Adaugă Manual</span>
                <span class="text-[9px] opacity-75 mt-0.5">Introducere rapidă</span>
            </button>
        </div>

        <!-- Notificare Procesare Imagine (Simulare OCR pe iPhone) -->
        <div id="notificareOCR" class="hidden bg-emerald-50 border border-emerald-200 p-3 rounded-xl text-xs text-emerald-800 flex items-center gap-2 animate-pulse">
            <span>✨</span> <span>Se analizează textul de pe bon... Suma a fost extrasă!</span>
        </div>

        <!-- Formularul Manual (Ascuns implicit pe mobil pentru a nu ocupa spațiu) -->
        <div id="zonaFormular" class="hidden bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
            <h3 class="font-bold text-sm text-gray-700">Detalii Tranzacție</h3>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1">Sumă (LEI)</label>
                    <input type="number" id="sumaInput" step="0.01" placeholder="0.00" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-indigo-500 font-bold">
                </div>
                <div>
                    <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1">Categorie</label>
                    <select id="categorieInput" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-indigo-500 text-sm">
                        <option value="Alimente">Alimente</option>
                        <option value="Utilități">Utilități</option>
                        <option value="Transport">Transport</option>
                        <option value="Divertisment">Divertisment</option>
                        <option value="Sănătate">Sănătate</option>
                        <option value="Altele">Altele</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="text-[10px] uppercase font-bold text-gray-400 block mb-1">Descriere / Magazin</label>
                <input type="text" id="descriereInput" placeholder="Ex: Kaufland, Factură Orange" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-indigo-500 text-sm">
            </div>
            <button onclick="salveazaTranzactie()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm active:bg-indigo-700 transition">Adaugă în Buget</button>
        </div>

        <!-- Distribuția pe Categorii (Grafic Procentual) -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-3">
            <h3 class="font-bold text-sm text-gray-700">Distribuție Procentuală din Total</h3>
            <div class="w-48 h-48 mx-auto">
                <canvas id="graficCategorii"></canvas>
            </div>
        </div>

        <!-- Istoric Tranzacții -->
        <div class="space-y-2">
            <h3 class="font-bold text-sm text-gray-500 px-1">Ultimele Cheltuieli raportate</h3>
            <div id="listaTranzactii" class="space-y-2 max-h-64 overflow-y-auto">
                <!-- Se generează din JavaScript -->
            </div>
        </div>

    </div>

    <script>
        // Încărcăm datele din memoria telefonului sau setăm valori de start
        let dateAplicatie = JSON.parse(localStorage.getItem('smartbuget_date')) || {
            buget_lunar: 4000,
            cheltuieli: [
                { suma: 150, categorie: "Alimente", descriere: "Supermarket", data: "20.05.2026" },
                { suma: 320, categorie: "Utilități", descriere: "Factură Curent", data: "18.05.2026" }
            ]
        };

        let chartCategorii = null;
        let chartProgres = null;

        // Setează luna curentă în header în funcție de anul 2026
        document.getElementById('dataCurenta').innerText = new Date().toLocaleDateString('ro-RO', { month: 'long', year: 'numeric' });
        document.getElementById('bugetSetat').value = dateAplicatie.buget_lunar;

        function salveazaInMemorie() {
            localStorage.setItem('smartbuget_date', JSON.stringify(dateAplicatie));
            actualizeazaInterfata();
        }

        function comutaFormular() {
            const f = document.getElementById('zonaFormular');
            f.classList.toggle('hidden');
        }

        function schimbaBuget(val) {
            dateAplicatie.buget_lunar = parseFloat(val) || 0;
            salveazaInMemorie();
        }

        function proceseazaBonFoto(event) {
            if(event.target.files.length === 0) return;
            
            const notificare = document.getElementById('notificareOCR');
            notificare.classList.remove('hidden');

            // Simulare algoritm inteligent OCR de extragere date de pe bonul fotografiat de pe iPhone
            setTimeout(() => {
                const sumeRandom = [45.90, 128.50, 32.00, 89.99, 210.00];
                const magazine = ["Mega Image", "Lidl", "Benzinărie", "Farmacie", "Dedeman"];
                const categorii = ["Alimente", "Alimente", "Transport", "Sănătate", "Altele"];
                
                const indexAleator = Math.floor(Math.random() * sumeRandom.length);

                document.getElementById('sumaInput').value = sumeRandom[indexAleator];
                document.getElementById('categorieInput').value = categorii[indexAleator];
                document.getElementById('descriereInput').value = "Foto: " + magazine[indexAleator];
                
                notificare.classList.add('hidden');
                document.getElementById('zonaFormular').classList.remove('hidden');
            }, 1500);
        }

        function salveazaTranzactie() {
            const suma = parseFloat(document.getElementById('sumaInput').value);
            const cat = document.getElementById('categorieInput').value;
            const desc = document.getElementById('descriereInput').value;

            if(!suma || !desc) { alert("Te rog introdu suma și descrierea!"); return; }

            dateAplicatie.cheltuieli.push({
                suma: suma,
                categorie: cat,
                descriere: desc,
                data: new Date().toLocaleDateString('ro-RO')
            });

            // Resetare formulare
            document.getElementById('sumaInput').value = '';
            document.getElementById('descriereInput').value = '';
            document.getElementById('zonaFormular').classList.add('hidden');

            salveazaInMemorie();
        }

        function actualizeazaInterfata() {
            const totalCheltuit = dateAplicatie.cheltuieli.reduce((acc, c) => acc + c.suma, 0);
            document.getElementById('textTotal').innerText = totalCheltuit.toFixed(2) + " LEI";

            const ramas = dateAplicatie.buget_lunar - totalCheltuit;
            const textRamas = document.getElementById('textRamas');
            textRamas.innerText = `Rămas luna asta: ${ramas.toFixed(2)} LEI`;
            if(ramas < 0) { textRamas.className = "text-xs font-semibold text-red-500 block"; } 
            else { textRamas.className = "text-xs font-semibold text-emerald-600 block"; }

            // Procent consumat
            const procent = Math.min((totalCheltuit / dateAplicatie.buget_lunar) * 100, 100).toFixed(0);
            document.getElementById('procentCentru').innerText = procent + "%";

            // Randare inel progres rapid
            if(chartProgres) chartProgres.destroy();
            chartProgres = new Chart(document.getElementById('graficProgresAnual').getContext('2d'), {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [totalCheltuit, Math.max(0, dateAplicatie.buget_lunar - totalCheltuit)],
                        backgroundColor: ['#4f46e5', '#e2e8f0'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
            });

            // Calcul sume pe categorii pentru graficul procentual din total
            const sumeCategorii = {};
            dateAplicatie.cheltuieli.forEach(c => {
                sumeCategorii[c.categorie] = (sumeCategorii[c.categorie] || 0) + c.suma;
            });

            if(chartCategorii) chartCategorii.destroy();
            chartCategorii = new Chart(document.getElementById('graficCategorii').getContext('2d'), {
                type: 'pie',
                data: {
                    labels: Object.keys(sumeCategorii),
                    datasets: [{
                        data: Object.values(sumeCategorii),
                        backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b']
                    }]
                },
                options: {
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                        tooltip: { callbacks: { label: function(context) {
                            let v = context.raw || 0;
                            let p = ((v / totalCheltuit) * 100).toFixed(1);
                            return `${context.label}: ${p}% (${v.toFixed(2)} LEI)`;
                        }}}
                    },
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            // Listă tranzacții stil iOS cards
            const lista = document.getElementById('listaTranzactii');
            if(dateAplicatie.cheltuieli.length === 0) {
                lista.innerHTML = `<p class="text-xs text-gray-400 text-center py-4">Nicio cheltuială adăugată încă.</p>`;
                return;
            }

            lista.innerHTML = dateAplicatie.cheltuieli.map((c, index) => `
                <div class="bg-white p-3.5 rounded-xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div>
                        <p class="text-sm font-bold text-gray-800">${c.descriere}</p>
                        <span class="text-[11px] text-gray-400 font-medium">${c.categorie} • ${c.data}</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-extrabold text-sm text-gray-900">-${c.suma.toFixed(2)} LEI</span>
                        <button onclick="stergeTranzactie(${index})" class="text-gray-300 hover:text-red-500 text-xs p-1">✕</button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function stergeTranzactie(index) {
            dateAplicatie.cheltuieli.splice(index, 1);
            salveazaInMemorie();
        }

        // Pornire inițială a aplicației pe ecranul iPhone-ului
        window.onload = actualizeazaInterfata;
    </script>
</body>
</html>
